<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeatStock Badge System</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', 'Inter', sans-serif; background: #0F0F0F; color: #F5F3F0; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
const { useState } = React;

const TIERS = [
  {
    id: 0,
    name: "Bronze",
    tagline: "Welcome to the student section.",
    points: 0,
    pointsLabel: "0 pts — unlocks when profile is complete",
    color: "#CD7F32",
    bgGradient: "linear-gradient(135deg, #1a0e00 0%, #2a1800 100%)",
    emoji: "🥉",
    badgeStyle: { background: "#1a0e00", border: "2px solid #CD7F32" },
    rewards: [
      { icon: "📸", label: "Profile photo (PFP)", detail: "Upload a profile picture to unlock" },
      { icon: "📧", label: ".edu verified", detail: "Verify your student email address" },
      { icon: "📱", label: "Phone number verified", detail: "Confirm your phone number" },
      { icon: "👤", label: "Username set", detail: "Choose your SeatStock username" },
      { icon: "✅", label: "Bronze badge unlocked", detail: "Bronze ring on your profile + full platform access" },
    ],
    howToEarn: [
      "Set your profile photo (PFP)",
      "Verify your .edu email address",
      "Verify your phone number",
      "Choose a username",
      "Complete all 4 to unlock Bronze — no transactions required",
    ],
  },
  {
    id: 1,
    name: "Silver",
    tagline: "You showed up. Now stay.",
    points: 100,
    pointsLabel: "100 pts to unlock",
    color: "#C0C0C0",
    bgGradient: "linear-gradient(135deg, #141414 0%, #1e1e1e 100%)",
    emoji: "🥈",
    badgeStyle: { background: "#1a1a1a", border: "2px solid #C0C0C0" },
    rewards: [
      { icon: "🥇", label: "Silver profile ring", detail: "Visible on your profile and listings" },
      { icon: "🏷️", label: "1 fee-free buy/sell", detail: "One fee-free transaction — expires 2 weeks after unlock" },
    ],
    howToEarn: [
      "Buy a ticket: +30 pts",
      "List a ticket: +20 pts",
      "Complete a sale: +40 pts",
      "Refer a friend who signs up: +25 pts",
      "Daily app open streak (7 days): +10 pts",
    ],
  },
  {
    id: 2,
    name: "Gold",
    tagline: "You're not just a fan. You're a regular.",
    points: 400,
    pointsLabel: "400 pts to unlock",
    color: "#FFD700",
    bgGradient: "linear-gradient(135deg, #1a1400 0%, #2a2000 100%)",
    emoji: "🥇",
    badgeStyle: { background: "#1a1400", border: "2px solid #FFD700" },
    rewards: [
      { icon: "🔴", label: "Gold profile ring", detail: "Gold ring on your profile and listings" },
      { icon: "📉", label: "9% take rate", detail: "Down from standard 10% on every sale" },
      { icon: "📌", label: "Priority listing placement", detail: "Your tickets surface higher in search — sell faster" },
      { icon: "👕", label: "SeatStock tee", detail: "Campus-specific colorway, shipped free" },
    ],
    howToEarn: [
      "All Silver point sources still apply",
      "Sell 3+ tickets in one season: +50 bonus pts",
      "5-star seller rating: +30 pts per review",
      "List within 24h of game announcement: +15 pts",
    ],
  },
  {
    id: 3,
    name: "Obsidian",
    tagline: "Your section runs through you.",
    points: 1000,
    pointsLabel: "1,000 pts to unlock",
    color: "#9B8EC4",
    bgGradient: "linear-gradient(135deg, #0d0b14 0%, #16122a 100%)",
    emoji: "🔮",
    badgeStyle: { background: "#0d0b14", border: "2px solid #9B8EC4" },
    rewards: [
      { icon: "🟢", label: "Obsidian profile ring", detail: "Deep purple Obsidian ring — rare and distinctive" },
      { icon: "📉", label: "8.5% take rate", detail: "1.5 points below standard — applies to all sales" },
      { icon: "🎟️", label: "3 fee-free listings/month", detail: "Triple the Silver allotment" },
      { icon: "⏰", label: "Early listing access", detail: "+30 min head start on new drops" },
      { icon: "🧢", label: "SeatStock hat", detail: "Limited campus colorway, not sold in store" },
    ],
    howToEarn: [
      "All lower-tier point sources still apply",
      "Recruit a Campus Growth Rep: +100 pts",
      "Hit 10 completed sales lifetime: +75 pts",
      "Perfect transaction streak (no disputes, 30 days): +40 pts",
    ],
  },
  {
    id: 4,
    name: "Platinum",
    tagline: "You don't just go to games. You run the market.",
    points: 2500,
    pointsLabel: "2,500 pts to unlock",
    color: "#E5E4E2",
    bgGradient: "linear-gradient(135deg, #111111 0%, #1c1c1c 100%)",
    emoji: "🏅",
    badgeStyle: { background: "#161616", border: "2px solid #E5E4E2" },
    rewards: [
      { icon: "🌲", label: "Platinum profile ring + glow", detail: "Platinum ring + subtle glow — less than 2% of users ever reach this" },
      { icon: "📉", label: "8% take rate", detail: "2% below standard rate" },
      { icon: "🎟️", label: "5 fee-free listings/month", detail: "Unlimited during rivalry week" },
      { icon: "⏰", label: "Early listing access", detail: "+60 min head start — first look at every drop" },
      { icon: "👟", label: "SeatStock hoodie", detail: "The full kit. Campus-exclusive colorway." },
      { icon: "⭐", label: "Student Spotlight eligible", detail: "Featured on SeatStock social and email blasts" },
    ],
    howToEarn: [
      "All lower-tier point sources still apply",
      "Top 3 seller at your school in a month: +150 pts",
      "25 completed sales lifetime: +200 pts",
      "Zero disputes in a full season: +100 pts",
    ],
  },
  {
    id: 5,
    name: "Diamond",
    tagline: "Built different. The student section knows your name.",
    points: 6000,
    pointsLabel: "6,000 pts to unlock",
    color: "#A8EDFF",
    bgGradient: "linear-gradient(135deg, #001520 0%, #0f0f0f 50%, #001520 100%)",
    emoji: "💎",
    badgeStyle: {
      background: "linear-gradient(135deg, #001a2a, #00111e)",
      border: "2px solid #A8EDFF",
      boxShadow: "0 0 20px rgba(168, 237, 255, 0.35)",
    },
    rewards: [
      { icon: "👑", label: "Animated Diamond badge + ice blue ring", detail: "The only animated badge on the platform — ice blue glow" },
      { icon: "📉", label: "5% take rate", detail: "Half of standard. Locked in for the season." },
      { icon: "∞", label: "Unlimited fee-free listings", detail: "No cap. Every listing, every game." },
      { icon: "⏰", label: "Early listing access", detail: "+90 min head start — first on every drop" },
      { icon: "📦", label: "Full Diamond merch kit", detail: "Hoodie + hat + exclusive Diamond-only colorway" },
      { icon: "📞", label: "Direct line to Josh", detail: "Real feedback channel. You helped build this." },
      { icon: "🏆", label: "Permanent school leaderboard", detail: "Your name on the wall. Forever." },
    ],
    howToEarn: [
      "Top seller at your school for a full season: +500 pts",
      "50 completed sales lifetime: +400 pts",
      "Referred 5+ active users: +250 pts",
      "Josh's discretionary award: invite only",
    ],
  },
];

const POINT_EVENTS = [
  { action: "Complete a purchase", pts: 30, category: "buyer" },
  { action: "List a ticket", pts: 20, category: "seller" },
  { action: "Complete a sale", pts: 40, category: "seller" },
  { action: "Receive a 5-star rating", pts: 30, category: "seller" },
  { action: "Refer a friend (they sign up)", pts: 25, category: "both" },
  { action: "Refer a friend (they transact)", pts: 50, category: "both" },
  { action: "7-day app open streak", pts: 10, category: "both" },
  { action: "List within 24h of game announcement", pts: 15, category: "seller" },
  { action: "Sell 3+ tickets in one season", pts: 50, category: "seller" },
  { action: "10 completed sales (lifetime)", pts: 75, category: "seller" },
  { action: "25 completed sales (lifetime)", pts: 200, category: "seller" },
  { action: "50 completed sales (lifetime)", pts: 400, category: "seller" },
  { action: "Perfect season (no disputes)", pts: 100, category: "both" },
  { action: "Recruit a Campus Growth Rep", pts: 100, category: "both" },
  { action: "Top 3 seller at your school (monthly)", pts: 150, category: "seller" },
  { action: "Top seller at your school (full season)", pts: 500, category: "seller" },
];

const SUMMARY_ROWS = [
  { tier: "Bronze", pts: "Auto", rate: "10%", perk: "Complete profile to unlock", emoji: "🥉", color: "#CD7F32" },
  { tier: "Silver", pts: "100", rate: "10%", perk: "1 fee-free buy/sell (2-wk expiry)", emoji: "🥈", color: "#C0C0C0" },
  { tier: "Gold", pts: "400", rate: "9%", perk: "Priority listing placement + tee", emoji: "🥇", color: "#FFD700" },
  { tier: "Obsidian", pts: "1,000", rate: "8.5%", perk: "Early access +30 min + hat", emoji: "🔮", color: "#9B8EC4" },
  { tier: "Platinum", pts: "2,500", rate: "8%", perk: "Hoodie + Spotlight eligible", emoji: "🏅", color: "#E5E4E2" },
  { tier: "Diamond", pts: "6,000", rate: "5%", perk: "Animated badge + unlimited free listings", emoji: "💎", color: "#A8EDFF" },
];

function SeatStockBadgeSystem() {
  const [activeTab, setActiveTab] = useState("tiers");
  const [selectedTier, setSelectedTier] = useState(null);
  const [filterCategory, setFilterCategory] = useState("all");

  const filteredEvents =
    filterCategory === "all"
      ? POINT_EVENTS
      : POINT_EVENTS.filter((e) => e.category === filterCategory || e.category === "both");

  return (
    <div style={{ fontFamily: "'Outfit', 'Inter', sans-serif", background: "#0F0F0F", minHeight: "100vh", color: "#F5F3F0" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(180deg, #1a0800 0%, #0F0F0F 100%)", borderBottom: "1px solid #2a2a2a", padding: "32px 24px 24px", textAlign: "center" }}>
        <div style={{ fontSize: 11, letterSpacing: 4, color: "#E34D31", fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>SeatStock Internal</div>
        <div style={{ fontSize: 26, fontWeight: 900, letterSpacing: -1, textTransform: "uppercase" }}>
          SEAT<span style={{ color: "#E34D31" }}>STOCK</span> BADGE SYSTEM
        </div>
        <div style={{ fontSize: 13, color: "#555", marginTop: 8 }}>6 Tiers · Points-Based · One Unified Track</div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: "1px solid #222" }}>
        {[["tiers", "All Tiers"], ["points", "Point Events"], ["summary", "Quick Ref"]].map(([tab, label]) => (
          <button key={tab} onClick={() => setActiveTab(tab)} style={{ flex: 1, padding: "14px 8px", background: "none", border: "none", borderBottom: activeTab === tab ? "2px solid #E34D31" : "2px solid transparent", color: activeTab === tab ? "#E34D31" : "#555", fontWeight: 700, fontSize: 11, letterSpacing: 2, textTransform: "uppercase", cursor: "pointer" }}>
            {label}
          </button>
        ))}
      </div>

      {/* TIERS */}
      {activeTab === "tiers" && (
        <div style={{ padding: "24px 16px", maxWidth: 720, margin: "0 auto" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {TIERS.map((tier, i) => (
              <div key={tier.id} onClick={() => setSelectedTier(selectedTier?.id === tier.id ? null : tier)} style={{ background: tier.bgGradient, border: `1px solid ${tier.color}33`, borderRadius: 12, overflow: "hidden", cursor: "pointer", boxShadow: selectedTier?.id === tier.id ? `0 0 0 2px ${tier.color}` : "none" }}>
                <div style={{ display: "flex", alignItems: "center", padding: "16px 18px", gap: 14 }}>
                  <div style={{ width: 48, height: 48, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0, ...tier.badgeStyle }}>
                    {tier.emoji}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
                      <span style={{ fontSize: 15, fontWeight: 900, textTransform: "uppercase", letterSpacing: 1, color: tier.color }}>{tier.name}</span>
                      <span style={{ fontSize: 9, background: `${tier.color}22`, color: tier.color, border: `1px solid ${tier.color}44`, borderRadius: 4, padding: "2px 6px", fontWeight: 700, letterSpacing: 1 }}>TIER {i + 1}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#999", marginBottom: 3 }}>{tier.tagline}</div>
                    <div style={{ fontSize: 11, color: "#444", fontWeight: 600 }}>{tier.pointsLabel}</div>
                  </div>
                  <div style={{ color: "#333", fontSize: 16, transform: selectedTier?.id === tier.id ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</div>
                </div>

                {selectedTier?.id === tier.id && (
                  <div style={{ borderTop: `1px solid ${tier.color}22`, padding: "16px 18px 20px" }}>
                    <div style={{ fontSize: 10, letterSpacing: 2, color: tier.color, fontWeight: 700, marginBottom: 10, textTransform: "uppercase" }}>Rewards Unlocked</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
                      {tier.rewards.map((r, ri) => (
                        <div key={ri} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                          <span style={{ fontSize: 15, flexShrink: 0 }}>{r.icon}</span>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 700 }}>{r.label}</div>
                            <div style={{ fontSize: 11, color: "#555", marginTop: 2 }}>{r.detail}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{ paddingTop: 16, borderTop: "1px solid #222" }}>
                      <div style={{ fontSize: 10, letterSpacing: 2, color: "#444", fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>How to Earn Points</div>
                      {tier.howToEarn.map((h, hi) => (
                        <div key={hi} style={{ display: "flex", gap: 8, fontSize: 12, color: "#777", marginBottom: 5 }}>
                          <span style={{ color: tier.color, flexShrink: 0 }}>→</span>
                          <span>{h}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ marginTop: 20, padding: 16, background: "#1a0800", borderRadius: 10, border: "1px solid #E34D3133" }}>
            <div style={{ fontSize: 10, letterSpacing: 2, color: "#E34D31", fontWeight: 700, marginBottom: 6, textTransform: "uppercase" }}>⚠️ Annual Reset</div>
            <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7 }}>Points reset each August 1st. Badge color and tier name are kept permanently as prestige markers. Active rewards (fee discounts, free listings) require re-earning each year.</div>
          </div>
        </div>
      )}

      {/* POINT EVENTS */}
      {activeTab === "points" && (
        <div style={{ padding: "24px 16px", maxWidth: 720, margin: "0 auto" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 20 }}>
            {[["all", "All"], ["buyer", "Buyers"], ["seller", "Sellers"]].map(([cat, label]) => (
              <button key={cat} onClick={() => setFilterCategory(cat)} style={{ padding: "7px 16px", borderRadius: 6, border: filterCategory === cat ? "none" : "1px solid #2a2a2a", background: filterCategory === cat ? "#E34D31" : "transparent", color: filterCategory === cat ? "#fff" : "#555", fontSize: 11, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", cursor: "pointer" }}>
                {label}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {filteredEvents.map((event, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 16px", background: "#1a1a1a", borderRadius: 8, border: "1px solid #222" }}>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600 }}>{event.action}</div>
                  <div style={{ fontSize: 10, marginTop: 3, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", color: event.category === "buyer" ? "#4a90e2" : event.category === "seller" ? "#1DB954" : "#E34D31" }}>
                    {event.category === "both" ? "Buyer + Seller" : event.category}
                  </div>
                </div>
                <div style={{ fontSize: 18, fontWeight: 900, color: "#E34D31" }}>+{event.pts}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* SUMMARY */}
      {activeTab === "summary" && (
        <div style={{ padding: "24px 16px", maxWidth: 720, margin: "0 auto" }}>
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 10, letterSpacing: 2, color: "#E34D31", fontWeight: 700, marginBottom: 12, textTransform: "uppercase" }}>All Tiers at a Glance</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 80px 1fr", gap: 1 }}>
              <div style={{ display: "contents" }}>
                {["Tier", "Pts", "Rate", "Key Perk"].map((h) => (
                  <div key={h} style={{ padding: "8px 10px", fontSize: 9, color: "#333", fontWeight: 700, letterSpacing: 1, textTransform: "uppercase" }}>{h}</div>
                ))}
              </div>
              {SUMMARY_ROWS.map((row, i) => (
                <div key={i} style={{ display: "contents" }}>
                  <div style={{ padding: "12px 10px", background: "#1a1a1a", borderRadius: i === 0 ? "8px 0 0 0" : i === SUMMARY_ROWS.length - 1 ? "0 0 0 8px" : 0, display: "flex", alignItems: "center", gap: 8, marginBottom: 1 }}>
                    <span style={{ fontSize: 14 }}>{row.emoji}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: row.color }}>{row.tier}</span>
                  </div>
                  <div style={{ padding: "12px 10px", background: "#1a1a1a", display: "flex", alignItems: "center", fontSize: 12, color: "#777", marginBottom: 1 }}>{row.pts}</div>
                  <div style={{ padding: "12px 10px", background: "#1a1a1a", display: "flex", alignItems: "center", fontSize: 13, fontWeight: 700, color: "#F5F3F0", marginBottom: 1 }}>{row.rate}</div>
                  <div style={{ padding: "12px 10px", background: "#1a1a1a", borderRadius: i === 0 ? "0 8px 0 0" : i === SUMMARY_ROWS.length - 1 ? "0 0 8px 0" : 0, display: "flex", alignItems: "center", fontSize: 11, color: "#555", marginBottom: 1 }}>{row.perk}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ padding: 16, background: "#1a1a1a", borderRadius: 10, border: "1px solid #222", marginBottom: 14 }}>
            <div style={{ fontSize: 10, letterSpacing: 2, color: "#E34D31", fontWeight: 700, marginBottom: 12, textTransform: "uppercase" }}>Take Rate Savings</div>
            {[["Bronze + Silver", "10%", null], ["Gold", "9%", "Save 1%"], ["Obsidian", "8.5%", "Save 1.5%"], ["Platinum", "8%", "Save 2%"], ["Diamond", "5%", "Save 5%"]].map(([tier, rate, save], i, arr) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: i < arr.length - 1 ? "1px solid #222" : "none" }}>
                <span style={{ fontSize: 12, color: "#777" }}>{tier}</span>
                <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                  <span style={{ fontSize: 13, fontWeight: 700 }}>{rate}</span>
                  {save && <span style={{ fontSize: 10, color: "#1DB954", fontWeight: 700 }}>{save}</span>}
                </div>
              </div>
            ))}
          </div>

          <div style={{ padding: 16, background: "#1a0800", borderRadius: 10, border: "1px solid #E34D3133" }}>
            <div style={{ fontSize: 10, letterSpacing: 2, color: "#E34D31", fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>Annual Reset Policy</div>
            {["Points reset each August 1st (start of football season)", "Badge color + tier name kept permanently as prestige markers", "Active rewards require re-earning each year", "Diamond tier: Josh retains discretion to grandfather top users"].map((line, i) => (
              <div key={i} style={{ fontSize: 12, color: "#555", marginBottom: 5, display: "flex", gap: 8 }}>
                <span style={{ color: "#E34D31" }}>→</span><span>{line}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={{ textAlign: "center", padding: "28px 16px", borderTop: "1px solid #1a1a1a", marginTop: 8 }}>
        <div style={{ fontSize: 10, color: "#2a2a2a", letterSpacing: 2, textTransform: "uppercase" }}>SeatStock Badge System · Internal Draft V1 · March 2026</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SeatStockBadgeSystem />);
  </script>
</body>
</html>
